name: Sincronizar Fotos desde Drive

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: pip install -r github_actions_requirements.txt

      - name: Correr script de descarga
        run: python sync_images.py
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: "6543"

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/images/events/*.webp || true
          # Solo hace commit si hay cambios reales para evitar el error de "nothing to commit"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto: Actualización de fotos desde Drive"
            git push
          else
            echo "No hay cambios nuevos en las imágenes."
          fi
